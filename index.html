<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>apykart – Earn Via Shop & Create</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --accent: #f97316;
      --accent-dark: #ea580c;
      --success: #16a34a;
      --danger: #dc2626;
      --bg: #f0f2f5;
      --card: #fff;
      --text: #111827;
      --text2: #4b5563;
      --text3: #9ca3af;
      --border: #e5e7eb;
      --shadow: 0 2px 12px rgba(0,0,0,.07);
      --shadow2: 0 1px 4px rgba(0,0,0,.06);
      --radius: 14px;
      --nav-h: 62px;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      overflow: hidden;
    }

    .page-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page { display: none; }
    .page.active { display: block; }

    .bottom-nav {
      height: var(--nav-h);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 0);
      flex-shrink: 0;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 0;
      cursor: pointer;
      color: var(--text3);
      font-size: 11px;
      font-weight: 700;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn:active {
      opacity: 0.9;
      transform: scale(0.98);
    }

    .btn.secondary {
      background: var(--bg);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn.danger {
      background: var(--danger);
    }

    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text2);
    }

    .form-input {
      border: 1.5px solid var(--border);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: var(--card);
      color: var(--text);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--primary);
      background: var(--card);
    }

    .upload-zone {
      border: 2px dashed var(--primary);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--primary-light);
      transition: all 0.2s;
    }

    .upload-zone:hover {
      background: var(--bg);
      border-color: var(--primary-dark);
    }

    .upload-zone.dragging {
      background: var(--primary-light);
      border-color: var(--primary-dark);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      padding: 14px 18px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 9999;
      max-width: 400px;
      font-size: 13px;
      font-weight: 600;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .toast.success { border-left: 4px solid var(--success); color: var(--success); }
    .toast.error { border-left: 4px solid var(--danger); color: var(--danger); }
    .toast.info { border-left: 4px solid var(--primary); color: var(--primary); }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      display: none;
    }

    .loading-overlay.show {
      display: flex;
    }

    .section { padding: 16px; }
    .section-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }

    .video-preview {
      width: 100%;
      max-height: 200px;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 16px;
      background: #000;
    }

    .image-preview {
      width: 100%;
      max-height: 180px;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 16px;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
    }

    .product-img {
      width: 60px;
      height: 60px;
      background: var(--bg);
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .product-info { flex: 1; }
    .product-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .product-price { font-size: 14px; font-weight: 700; color: var(--primary); }

    .error-msg {
      color: var(--danger);
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div id="app">
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Navigation -->
  <div class="page-scroll" id="pageScroll">
    <!-- Home Page -->
    <div class="page active" id="page-home">
      <div class="section">
        <h1 class="section-title">🏠 apykart</h1>
        <p>Welcome to your shop & create platform</p>
      </div>
    </div>

    <!-- Seller Dashboard -->
    <div class="page" id="page-seller">
      <div class="section">
        <h2 class="section-title">📦 My Products</h2>
        <button class="btn" onclick="showUploadProduct()">+ Add Product</button>
        <div id="sellerProducts" style="margin-top: 16px;"></div>
      </div>
    </div>

    <!-- Upload Product -->
    <div class="page" id="page-upload-product">
      <div class="section">
        <h2 class="section-title">Add New Product</h2>
        
        <div class="form-group">
          <label class="form-label">Product Name</label>
          <input type="text" id="prodName" class="form-input" placeholder="Enter product name">
          <div class="error-msg" id="prodNameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Price</label>
          <input type="number" id="prodPrice" class="form-input" placeholder="Enter price">
          <div class="error-msg" id="prodPriceError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="prodDesc" class="form-input" placeholder="Enter description" style="min-height: 100px; resize: vertical;"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Product Image</label>
          <div class="upload-zone" id="productImageZone">
            <div>📸 Click or drag image here</div>
            <input type="file" id="productImage" accept="image/*" style="display: none;">
          </div>
          <img id="productImagePreview" class="image-preview" style="display: none;">
          <div class="error-msg" id="productImageError"></div>
        </div>

        <div style="display: flex; gap: 10px;">
          <button class="btn secondary" onclick="showPage('seller')">Cancel</button>
          <button class="btn" onclick="uploadProduct()" style="flex: 1;">Upload Product</button>
        </div>
      </div>
    </div>

    <!-- Video Upload -->
    <div class="page" id="page-upload-video">
      <div class="section">
        <h2 class="section-title">📹 Upload Video</h2>
        
        <div class="form-group">
          <label class="form-label">Video Title</label>
          <input type="text" id="videoTitle" class="form-input" placeholder="Enter video title">
          <div class="error-msg" id="videoTitleError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Link Product (Optional)</label>
          <input type="text" id="videoProductId" class="form-input" placeholder="Product ID (optional)">
        </div>

        <div class="form-group">
          <label class="form-label">Video File</label>
          <div class="upload-zone" id="videoUploadZone">
            <div>🎬 Click or drag video here</div>
            <div style="font-size: 11px; color: var(--text3); margin-top: 8px;">Max 100MB</div>
            <input type="file" id="videoFile" accept="video/*" style="display: none;">
          </div>
          <video id="videoPreview" class="video-preview" style="display: none;"></video>
          <div class="error-msg" id="videoError"></div>
        </div>

        <div style="display: flex; gap: 10px;">
          <button class="btn secondary" onclick="showPage('home')">Cancel</button>
          <button class="btn" onclick="uploadVideo()" style="flex: 1;">Upload Video</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showPage('home')">🏠 Home</div>
    <div class="nav-item" onclick="showPage('seller')">📦 Seller</div>
    <div class="nav-item" onclick="showPage('upload-video')">📹 Upload</div>
  </div>
</div>

<script>
// ===== Firebase Configuration =====
const firebaseConfig = {
  apiKey: "AIzaSyC_YOUR_KEY",
  authDomain: "apykart-916.firebaseapp.com",
  projectId: "apykart-916",
  storageBucket: "apykart-916.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ===== State Management =====
let currentUser = null;
let uploadProgress = 0;

// ===== Utility Functions =====
function showPage(pageName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${pageName}`).classList.add('active');
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');
}

function showLoading(show = true) {
  const overlay = document.getElementById('loadingOverlay');
  if (show) {
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
  }
}

function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function clearError(elementId) {
  const errorEl = document.getElementById(elementId);
  if (errorEl) {
    errorEl.classList.remove('show');
    errorEl.textContent = '';
  }
}

function showError(elementId, message) {
  const errorEl = document.getElementById(elementId);
  if (errorEl) {
    errorEl.textContent = message;
    errorEl.classList.add('show');
  }
}

// ===== File Handling =====
function setupFileUpload(zoneId, inputId, previewId, fileType = 'image') {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  const preview = previewId ? document.getElementById(previewId) : null;

  zone.addEventListener('click', () => input.click());

  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    zone.classList.add('dragging');
  });

  zone.addEventListener('dragleave', () => {
    zone.classList.remove('dragging');
  });

  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragging');
    handleFileSelect(e.dataTransfer.files[0], input, preview, fileType);
  });

  input.addEventListener('change', (e) => {
    handleFileSelect(e.target.files[0], input, preview, fileType);
  });
}

function handleFileSelect(file, input, preview, fileType) {
  if (!file) return;

  if (fileType === 'image' && !file.type.startsWith('image/')) {
    showError('productImageError', 'Please select an image file');
    return;
  }

  if (fileType === 'video') {
    if (!file.type.startsWith('video/')) {
      showError('videoError', 'Please select a video file');
      return;
    }
    if (file.size > 100 * 1024 * 1024) {
      showError('videoError', 'Video must be less than 100MB');
      return;
    }
  }

  if (fileType === 'image' && file.size > 5 * 1024 * 1024) {
    showError('productImageError', 'Image must be less than 5MB');
    return;
  }

  if (preview) {
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
}

// ===== Product Upload =====
async function uploadProduct() {
  const name = document.getElementById('prodName').value.trim();
  const price = document.getElementById('prodPrice').value.trim();
  const desc = document.getElementById('prodDesc').value.trim();
  const imageFile = document.getElementById('productImage').files[0];

  // Validation
  let isValid = true;
  
  if (!name) {
    showError('prodNameError', 'Product name is required');
    isValid = false;
  } else {
    clearError('prodNameError');
  }

  if (!price || isNaN(price) || price <= 0) {
    showError('prodPriceError', 'Valid price is required');
    isValid = false;
  } else {
    clearError('prodPriceError');
  }

  if (!imageFile) {
    showError('productImageError', 'Product image is required');
    isValid = false;
  } else {
    clearError('productImageError');
  }

  if (!isValid) return;

  try {
    showLoading(true);

    let imageUrl = null;

    // Upload image
    if (imageFile) {
      const imagePath = `products/${currentUser.uid}/${Date.now()}_${imageFile.name}`;
      const imageRef = storage.ref(imagePath);
      const uploadTask = imageRef.put(imageFile);

      await new Promise((resolve, reject) => {
        uploadTask.on('state_changed',
          (snapshot) => {
            uploadProgress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          },
          (error) => {
            showError('productImageError', 'Image upload failed: ' + error.message);
            reject(error);
          },
          async () => {
            imageUrl = await imageRef.getDownloadURL();
            resolve();
          }
        );
      });
    }

    // Save to Firestore
    const productRef = await db.collection('products').add({
      name: name,
      price: parseFloat(price),
      description: desc,
      image: imageUrl,
      sellerId: currentUser.uid,
      sellerEmail: currentUser.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'pending',
      views: 0,
      sales: 0
    });

    showToast('Product uploaded successfully!', 'success');
    
    // Reset form
    document.getElementById('prodName').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodDesc').value = '';
    document.getElementById('productImage').value = '';
    document.getElementById('productImagePreview').style.display = 'none';

    showPage('seller');
    loadSellerProducts();

  } catch (error) {
    console.error('Error uploading product:', error);
    showToast('Error uploading product: ' + error.message, 'error');
  } finally {
    showLoading(false);
  }
}

// ===== Video Upload =====
async function uploadVideo() {
  const title = document.getElementById('videoTitle').value.trim();
  const videoFile = document.getElementById('videoFile').files[0];

  // Validation
  let isValid = true;

  if (!title) {
    showError('videoTitleError', 'Video title is required');
    isValid = false;
  } else {
    clearError('videoTitleError');
  }

  if (!videoFile) {
    showError('videoError', 'Video file is required');
    isValid = false;
  } else {
    clearError('videoError');
  }

  if (!isValid) return;

  try {
    showLoading(true);

    let videoUrl = null;

    // Upload video with proper error handling
    if (videoFile) {
      const videoPath = `videos/${currentUser.uid}/${Date.now()}_${videoFile.name}`;
      const videoRef = storage.ref(videoPath);
      
      const uploadTask = videoRef.put(videoFile, {
        contentType: videoFile.type || 'video/mp4',
        customMetadata: {
          uploadedBy: currentUser.email,
          uploadTime: new Date().toISOString()
        }
      });

      await new Promise((resolve, reject) => {
        uploadTask.on('state_changed',
          (snapshot) => {
            uploadProgress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            console.log('Upload progress:', uploadProgress);
          },
          (error) => {
            console.error('Upload error:', error);
            showError('videoError', 'Video upload failed: ' + (error.message || 'Unknown error'));
            reject(error);
          },
          async () => {
            try {
              videoUrl = await videoRef.getDownloadURL();
              resolve();
            } catch (err) {
              reject(err);
            }
          }
        );
      });
    }

    // Save to Firestore
    const videoRef = await db.collection('videos').add({
      title: title,
      videoUrl: videoUrl,
      uploaderUid: currentUser.uid,
      uploaderEmail: currentUser.email,
      productId: document.getElementById('videoProductId').value || null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'pending',
      views: 0,
      likes: 0
    });

    showToast('Video uploaded successfully! Awaiting approval.', 'success');
    
    // Reset form
    document.getElementById('videoTitle').value = '';
    document.getElementById('videoProductId').value = '';
    document.getElementById('videoFile').value = '';
    document.getElementById('videoPreview').style.display = 'none';

    showPage('home');

  } catch (error) {
    console.error('Error uploading video:', error);
    showToast('Error uploading video: ' + error.message, 'error');
  } finally {
    showLoading(false);
  }
}

// ===== Load Seller Products =====
async function loadSellerProducts() {
  if (!currentUser) return;

  try {
    const querySnapshot = await db.collection('products')
      .where('sellerId', '==', currentUser.uid)
      .orderBy('createdAt', 'desc')
      .get();

    const container = document.getElementById('sellerProducts');
    
    if (querySnapshot.empty) {
      container.innerHTML = '<p style="text-align: center; color: var(--text3); padding: 20px;">No products yet</p>';
      return;
    }

    container.innerHTML = '';
    querySnapshot.forEach(doc => {
      const product = doc.data();
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img src="${product.image || ''}" alt="${product.name}" class="product-img" onerror="this.src='📦'">
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-price">₹${product.price}</div>
          <div style="font-size: 11px; color: var(--text3); margin-top: 4px;">
            Status: <strong>${product.status || 'pending'}</strong>
          </div>
        </div>
      `;
      container.appendChild(card);
    });

  } catch (error) {
    console.error('Error loading products:', error);
    showToast('Error loading products', 'error');
  }
}

function showUploadProduct() {
  document.getElementById('prodName').value = '';
  document.getElementById('prodPrice').value = '';
  document.getElementById('prodDesc').value = '';
  document.getElementById('productImage').value = '';
  document.getElementById('productImagePreview').style.display = 'none';
  showPage('upload-product');
}

// ===== Authentication =====
async function initAuth() {
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      console.log('User logged in:', user.email);
      await loadSellerProducts();
    } else {
      currentUser = null;
      console.log('User not logged in');
    }
  });
}

// ===== Initialize App =====
function initApp() {
  // Setup file uploads
  setupFileUpload('productImageZone', 'productImage', 'productImagePreview', 'image');
  setupFileUpload('videoUploadZone', 'videoFile', 'videoPreview', 'video');

  // Initialize auth
  initAuth();

  // For testing - Auto login (remove in production)
  // auth.signInAnonymously().catch(console.error);
}

// Start app when DOM is ready
document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>

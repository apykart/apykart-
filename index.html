<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>apykart – Earn Via Shop & Create</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--primary-mid:#dbeafe;
  --accent:#f97316;--accent-dark:#ea580c;--accent2:#fbbf24;
  --success:#16a34a;--danger:#dc2626;
  --coin:#b45309;--coin-bg:#fffbeb;--coin-border:#fde68a;
  --bg:#f0f2f5;--card:#fff;--text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --border:#e5e7eb;--shadow:0 2px 12px rgba(0,0,0,.07);--shadow2:0 1px 4px rgba(0,0,0,.06);--shadow3:0 8px 32px rgba(37,99,235,.18);
  --header-h:68px;--nav-h:62px;--radius:14px;--radius-sm:10px;--radius-lg:18px;
  --font-head:'Plus Jakarta Sans',system-ui,sans-serif;--font-body:'Inter',system-ui,sans-serif;
}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;background:var(--bg);font-family:var(--font-body);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font-body)}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}

/* SPLASH SCREEN */
#loadingScreen{position:fixed;inset:0;z-index:9999;background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#loadingScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;animation:splashIn .6s cubic-bezier(.34,1.4,.64,1) both}
@keyframes splashIn{from{opacity:0;transform:translateY(24px) scale(.9)}to{opacity:1;transform:none}}
.loading-logo-icon{width:88px;height:88px;border-radius:26px;background:linear-gradient(145deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;box-shadow:0 16px 48px rgba(37,99,235,.3)}
.loading-logo-text{font-family:var(--font-head);font-size:32px;font-weight:900;color:#fff;letter-spacing:-.5px}
.loading-logo-text span{color:#fbbf24}
.loading-tagline{font-size:12px;font-weight:500;color:#6b7280;letter-spacing:.5px;text-transform:uppercase;margin-top:-10px}
.loading-bar-wrap{margin-top:56px;width:120px;height:3px;background:#1f2937;border-radius:99px;overflow:hidden}
.loading-bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:99px;animation:loadBar 2.2s ease forwards}
@keyframes loadBar{0%{width:0}40%{width:50%}80%{width:85%}100%{width:100%}}
.loading-dots{display:flex;gap:6px;margin-top:20px}
.loading-dot{width:6px;height:6px;border-radius:50%;background:#374151;animation:dotPulse 1.4s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1;background:#60a5fa}}

/* SHELL */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;height:-webkit-fill-available;max-width:480px;margin:0 auto;position:relative;background:var(--bg);overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.1)}

/* HEADER */
.app-header{height:70px;background:linear-gradient(135deg,#fff 0%,#f0f6ff 100%);border-bottom:1px solid rgba(37,99,235,.1);display:flex;align-items:center;padding:0 14px;gap:10px;position:relative;z-index:50}
.app-header.hidden{display:none}
.header-logo{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;flex-direction:column;gap:1px;align-items:flex-start}
.header-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(37,99,235,.35)}
.header-logo-text{font-family:var(--font-head);font-weight:900;font-size:21px;background:linear-gradient(135deg,#111827,#1e40af);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-logo-text span{background:linear-gradient(135deg,#2563eb,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.header-video-pill{display:flex;align-items:center;gap:3px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);border-radius:99px;padding:2px 7px;margin-top:1px;width:fit-content}
.header-video-dot{width:5px;height:5px;background:#f97316;border-radius:50%;animation:videoPulse 2s infinite;flex-shrink:0}
@keyframes videoPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
.header-video-label{font-size:9px;font-weight:700;color:#ea580c;letter-spacing:.3px;text-transform:uppercase}
.header-actions{display:flex;gap:6px}
.header-btn{width:38px;height:38px;background:rgba(37,99,235,.06);border:1.5px solid rgba(37,99,235,.12);color:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.header-btn:active{background:var(--primary-light)}
.header-upload-btn{background:linear-gradient(135deg,#f97316,#ea580c);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(249,115,22,.3)}
.cart-badge{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center}

/* PAGES */
.page-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;padding-bottom:6px}
.page-scroll::-webkit-scrollbar{display:none}
.page{display:none;animation:pgIn .22s ease}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* HERO CAROUSEL */
.hero-carousel{margin:4px 12px 0;border-radius:var(--radius-lg);overflow:hidden;position:relative;height:160px}
.hero-slide{position:absolute;inset:0;border-radius:var(--radius-lg);padding:22px 20px;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;transition:opacity .5s ease;pointer-events:none}
.hero-slide.active{opacity:1;pointer-events:all}
.hero-slide-1{background:linear-gradient(135deg,#7c3aed 0%,#2563eb 100%)}
.hero-slide-2{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)}
.hero-slide-3{background:linear-gradient(135deg,#be123c 0%,#f97316 100%)}
.hero-title{font-family:var(--font-head);font-size:22px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:5px;letter-spacing:-.3px}
.hero-btn{display:inline-flex;align-items:center;gap:4px;background:#fff;color:var(--text);font-size:12px;font-weight:800;padding:7px 16px;border-radius:99px;cursor:pointer}

/* CATEGORIES */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:18px 14px 10px}
.section-title{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text)}
.section-link{font-size:12px;color:var(--primary);font-weight:700;cursor:pointer}
.categories-scroll{display:flex;gap:10px;padding:0 14px 2px;overflow-x:auto;scrollbar-width:none}
.categories-scroll::-webkit-scrollbar{display:none}
.cat-chip{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.cat-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:var(--shadow2)}
.cat-label{font-size:10px;font-weight:700;color:var(--text2);text-align:center}

/* PRODUCTS GRID */
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 14px}
.product-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2);cursor:pointer;border:1px solid var(--border);position:relative}
.product-card:active{transform:scale(.96);transition:transform .15s}
.product-img-wrap{background:#f8fafc;height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.product-img-wrap img{width:100%;height:100%;object-fit:cover}
.product-badge{position:absolute;top:8px;left:8px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;z-index:1}
.product-info{padding:9px}
.product-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-price{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text)}
.product-rating{font-size:10px;font-weight:700;color:#fff;background:#16a34a;padding:2px 5px;border-radius:4px}

/* BOTTOM NAV */
.bottom-nav{height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 0}
.nav-icon{color:var(--text3);transition:color .2s;font-size:20px}
.nav-label{font-size:10px;font-weight:700;color:var(--text3)}
.nav-item.active .nav-label{color:var(--primary)}
.nav-item.active .nav-icon{color:var(--primary)}

/* LOADING */
.products-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast-container{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:7px;width:calc(100% - 28px);max-width:440px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;background:#fff;border-radius:10px;padding:11px 14px;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:toastIn .25s ease;font-size:12px;font-weight:700;border-left:4px solid}
.toast-success{border-color:var(--success)}
.toast-error{border-color:var(--danger)}
.toast-info{border-color:var(--primary)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-icon{font-size:72px}
.empty-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text)}
.empty-text{font-size:13px;color:var(--text2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px}

</style>
</head>
<body>

<div id="loadingScreen">
  <div class="loading-logo-wrap">
    <div class="loading-logo-icon">🛍️</div>
    <div class="loading-logo-text">apykart</div>
    <div class="loading-tagline">Shop Smarter · Earn Better</div>
  </div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-dots">
    <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
  </div>
</div>

<div id="app">
  <header class="app-header" id="appHeader">
    <div class="header-logo" onclick="showPage('home')">
      <div>apykart</div>
      <div class="header-video-pill">
        <div class="header-video-dot"></div>
        <span class="header-video-label">Live</span>
      </div>
    </div>
    <div style="flex:1"></div>
    <div class="header-actions">
      <div class="header-btn" onclick="showPage('search')" title="Search">🔍</div>
      <div class="header-btn" onclick="showPage('cart')" title="Cart" style="position:relative">
        🛒
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
      </div>
    </div>
  </header>

  <div class="page-scroll" id="pageScroll">
    <div class="page active" id="page-home">
      <div class="section-header">
        <div class="section-title">Featured Products</div>
      </div>
      <div class="products-grid" id="homeGrid"></div>
    </div>

    <div class="page" id="page-search">
      <div style="padding:12px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10">
        <input type="text" id="searchInput" placeholder="Search..." style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:9px;font-size:14px" oninput="handleSearch(this.value)">
      </div>
      <div id="searchContent"></div>
    </div>

    <div class="page" id="page-cart">
      <div id="cartContent"></div>
    </div>

    <div class="page" id="page-profile">
      <div id="profileContent"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="showPage('home')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </div>
    <div class="nav-item" onclick="showPage('search')">
      <div class="nav-icon">🔍</div>
      <div class="nav-label">Search</div>
    </div>
    <div class="nav-item" onclick="showPage('cart')">
      <div class="nav-icon">🛒</div>
      <div class="nav-label">Cart</div>
    </div>
    <div class="nav-item" onclick="showPage('profile')">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>
<script src="https://upload-widget.cloudinary.com/latest/index.js"></script>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "apykart-916.firebaseapp.com",
  projectId: "apykart-916",
  storageBucket: "apykart-916.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// Initialize Firebase
let db, auth;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  auth = firebase.auth();
  console.log('✅ Firebase initialized successfully');
} catch(err) {
  console.error('⚠️ Firebase init error:', err.message);
  // Continue with demo mode
}

// ==================== STATE ====================
let state = {
  currentPage: 'home',
  cart: [],
  products: [],
  currentUser: null,
  searchQuery: ''
};

// ==================== UTILITIES ====================
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function showPage(page) {
  // Hide all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  // Show selected page
  document.getElementById(`page-${page}`)?.classList.add('active');
  event.target.closest('.nav-item')?.classList.add('active');
  
  state.currentPage = page;
  
  // Render page content
  if(page === 'home') renderHome();
  else if(page === 'cart') renderCart();
  else if(page === 'profile') renderProfile();
  else if(page === 'search') renderSearch();
}

function hideLoading() {
  document.getElementById('loadingScreen').classList.add('hidden');
}

// ==================== PRODUCTS ====================
async function loadProducts() {
  try {
    if(!db) {
      // Demo products
      state.products = [
        { id: 1, name: 'Premium Headphones', price: 1999, image: '🎧', rating: 4.5 },
        { id: 2, name: 'Smart Watch', price: 2499, image: '⌚', rating: 4.8 },
        { id: 3, name: 'Wireless Earbuds', price: 1499, image: '🎵', rating: 4.6 },
        { id: 4, name: 'Phone Stand', price: 299, image: '📱', rating: 4.2 },
        { id: 5, name: 'USB-C Cable', price: 399, image: '🔌', rating: 4.7 },
        { id: 6, name: 'Power Bank', price: 999, image: '🔋', rating: 4.5 }
      ];
      return;
    }
    
    const snapshot = await db.collection('products').limit(6).get();
    state.products = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
  } catch(err) {
    console.error('Error loading products:', err);
    showToast('Failed to load products', 'error');
  }
}

function renderHome() {
  const grid = document.getElementById('homeGrid');
  if(!state.products.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📦</div><div class="empty-title">No Products</div></div>';
    return;
  }
  
  grid.innerHTML = state.products.map(p => `
    <div class="product-card" onclick="addToCart(${p.id})">
      <div class="product-img-wrap" style="font-size:64px;display:flex;align-items:center;justify-content:center">${p.image}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="product-rating">⭐ ${p.rating}</span>
        </div>
        <div class="product-price">₹${p.price}</div>
      </div>
    </div>
  `).join('');
}

function renderCart() {
  const content = document.getElementById('cartContent');
  
  if(!state.cart.length) {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Cart Empty</div><div class="empty-text">Add items to get started</div></div>';
    return;
  }
  
  const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  
  content.innerHTML = `
    <div style="padding:14px">
      ${state.cart.map(item => `
        <div style="background:#fff;border-radius:var(--radius);padding:12px;margin-bottom:9px;display:flex;gap:10px;border:1px solid var(--border)">
          <div style="font-size:44px;width:60px;height:60px;background:var(--bg);border-radius:9px;display:flex;align-items:center;justify-content:center">${item.image}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text)">${item.name}</div>
            <div style="font-size:14px;font-weight:800;color:var(--primary);margin:6px 0">₹${item.price}</div>
            <div style="display:flex;gap:6px;align-items:center">
              <button onclick="updateQty(${item.id},-1)" style="width:28px;height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-weight:700">−</button>
              <span style="font-weight:700;min-width:20px;text-align:center">${item.qty}</span>
              <button onclick="updateQty(${item.id},1)" style="width:28px;height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-weight:700">+</button>
              <button onclick="removeFromCart(${item.id})" style="margin-left:auto;color:var(--danger);font-weight:700">Remove</button>
            </div>
          </div>
        </div>
      `).join('')}
      
      <div style="background:#fff;border-radius:var(--radius);padding:14px;margin:14px 0;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px">
          <span>Subtotal:</span>
          <span>₹${total}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;border-top:1px solid var(--border);padding-top:10px">
          <span>Total:</span>
          <span style="color:var(--primary)">₹${total}</span>
        </div>
      </div>
      
      <button onclick="checkout()" style="width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-size:14px;font-weight:800;padding:15px;border-radius:12px;border:none;cursor:pointer">Checkout</button>
    </div>
  `;
}

function renderProfile() {
  const content = document.getElementById('profileContent');
  content.innerHTML = `
    <div style="padding:14px">
      <div style="background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:14px">
        <div style="font-size:28px;margin-bottom:8px">👤</div>
        <div style="font-family:var(--font-head);font-size:17px;font-weight:900">Welcome to apykart</div>
        <div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:4px">Tap to sign in</div>
      </div>
      
      <div style="background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:12px">Quick Links</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          <div style="padding:12px;background:var(--bg);border-radius:9px;cursor:pointer;font-weight:700;color:var(--text)">📦 My Orders</div>
          <div style="padding:12px;background:var(--bg);border-radius:9px;cursor:pointer;font-weight:700;color:var(--text)">❤️ Wishlist</div>
          <div style="padding:12px;background:var(--bg);border-radius:9px;cursor:pointer;font-weight:700;color:var(--text)">🎬 Upload Video</div>
        </div>
      </div>
    </div>
  `;
}

function renderSearch() {
  const content = document.getElementById('searchContent');
  
  if(!state.searchQuery) {
    content.innerHTML = '<div class="empty-state"><div class="empty-text">Start typing to search</div></div>';
    return;
  }
  
  const results = state.products.filter(p => 
    p.name.toLowerCase().includes(state.searchQuery.toLowerCase())
  );
  
  if(!results.length) {
    content.innerHTML = '<div class="empty-state"><div class="empty-text">No results found</div></div>';
    return;
  }
  
  content.innerHTML = `
    <div class="products-grid" style="padding:12px;grid-template-columns:1fr">
      ${results.map(p => `
        <div class="product-card" onclick="addToCart(${p.id})" style="display:flex;gap:12px">
          <div style="font-size:48px;width:80px;height:80px;background:var(--bg);border-radius:9px;display:flex;align-items:center;justify-content:center">​${p.image}</div>
          <div style="flex:1;padding:12px">
            <div class="product-name">${p.name}</div>
            <div style="display:flex;align-items:center;gap:8px;margin:8px 0">
              <span class="product-rating">⭐ ${p.rating}</span>
            </div>
            <div class="product-price">₹${p.price}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function handleSearch(query) {
  state.searchQuery = query;
  renderSearch();
}

function addToCart(productId) {
  const product = state.products.find(p => p.id === productId);
  if(!product) return;
  
  const existing = state.cart.find(c => c.id === productId);
  if(existing) {
    existing.qty++;
  } else {
    state.cart.push({ ...product, qty: 1 });
  }
  
  updateCartBadge();
  showToast('Added to cart', 'success');
}

function updateQty(productId, change) {
  const item = state.cart.find(c => c.id === productId);
  if(!item) return;
  
  item.qty += change;
  if(item.qty <= 0) removeFromCart(productId);
  else {
    updateCartBadge();
    renderCart();
  }
}

function removeFromCart(productId) {
  state.cart = state.cart.filter(c => c.id !== productId);
  updateCartBadge();
  renderCart();
}

function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  if(state.cart.length) {
    badge.textContent = state.cart.length;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function checkout() {
  if(!state.cart.length) {
    showToast('Cart is empty', 'error');
    return;
  }
  
  const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  showToast(`Order placed! Total: ₹${total}`, 'success');
  
  state.cart = [];
  updateCartBadge();
  renderCart();
}

// ==================== INIT ====================
async function init() {
  try {
    console.log('🚀 Initializing app...');
    await loadProducts();
    hideLoading();
    renderHome();
    console.log('✅ App ready!');
  } catch(err) {
    console.error('Init error:', err);
    hideLoading();
    showToast('Failed to initialize', 'error');
  }
}

// Start app
if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
